<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Baby Movement Tracker</title>

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#ff6b9d">

<link rel="manifest" href="manifest.json">

</head>

<body>

<div class="container">

<header>

<h1>❤️ Baby Movement Tracker</h1>

<p id="todayDate"></p>

<div class="summaryCard">

<div class="summaryItem">

<p class="label">Today's Count</p>

<h2 id="todayCount">0</h2>

</div>

<div class="summaryItem">

<p class="label">Last Movement</p>

<h3 id="lastMovement">--</h3>

</div>

</div>

</header>

<h2 class="sectionTitle">
Record Baby Movement
</h2>

<div class="buttonGrid">

<button
class="movementButton flutter"
onclick="saveMovement('Flutters & Bubbles')">

🫧

<span>Flutters & Bubbles</span>

</button>

<button
class="movementButton kick"
onclick="saveMovement('Kicks & Jabs')">

👣

<span>Kicks & Jabs</span>

</button>

<button
class="movementButton roll"
onclick="saveMovement('Rolls & Turns')">

🔄

<span>Rolls & Turns</span>

</button>

<button
class="movementButton hiccup"
onclick="saveMovement('Hiccups')">

💓

<span>Hiccups</span>

</button>

<button
class="movementButton stretch"
onclick="saveMovement('Stretches')">

🤲

<span>Stretches</span>

</button>

</div>

<div class="timeline">

<h2>

Today's Timeline

</h2>

<div id="timeline">

No movement recorded today.

</div>

</div>

<div class="bottomButtons">

<button>

📊 Statistics

</button>

<button>

📅 Calendar

</button>

<button onclick="clearToday()">

🗑 Clear

</button>

</div>

</div>

<script src="config.js"></script>

<script src="app.js"></script>

<script>

if ('serviceWorker' in navigator) {

navigator.serviceWorker.register('sw.js');

}

</script>

</body>

</html>
